name: Apply Supabase migrations

# Pushes any new files under supabase/migrations/ to the linked Supabase
# project via the Supabase CLI. Runs automatically on master when the
# migrations directory changes, and on manual dispatch from the Actions tab.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — personal access token from
#                            https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_ID    — the project ref (e.g. "abcdefghijklmnopqrst"),
#                            found in Project Settings → General
#   SUPABASE_DB_PASSWORD   — the database password set when the project was
#                            created, used by `supabase db push`

on:
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"

      - name: Push migrations
        run: supabase db push
