name: Apply Supabase migrations

# Pushes any new files under supabase/migrations/ to your Supabase
# Postgres database via direct connection. Runs on master pushes that
# touch migrations and on manual dispatch.
#
# Note: the NEXT_PUBLIC_SUPABASE_URL / SUPABASE_ANON_KEY env vars the
# app uses at runtime CANNOT apply DDL — the anon key is gated by RLS
# and has no CREATE TABLE permission. This workflow uses the postgres
# superuser connection instead.
#
# Required repository secret (Settings → Secrets and variables → Actions):
#   SUPABASE_DB_URL  — Session pooler connection string for your project.
#                      Copy from Supabase Dashboard → Project Settings →
#                      Database → Connection string → "Session pooler" tab.
#                      Looks like:
#                      postgresql://postgres.[REF]:[PASSWORD]@aws-0-[REGION].pooler.supabase.com:5432/postgres
#
#                      Do NOT use the "Direct connection" — Supabase no
#                      longer offers IPv4 on it, and GitHub-hosted runners
#                      are IPv4-only.
#                      Do NOT use the "Transaction pooler" (port 6543) —
#                      `supabase db push` takes a pg_advisory_lock, which
#                      PgBouncer transaction mode rejects.
#
#                      If your password contains special characters they
#                      must be percent-encoded.

on:
  push:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
  workflow_dispatch:

concurrency:
  group: supabase-migrations
  cancel-in-progress: false

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations
        run: supabase db push --db-url "${{ secrets.SUPABASE_DB_URL }}"
